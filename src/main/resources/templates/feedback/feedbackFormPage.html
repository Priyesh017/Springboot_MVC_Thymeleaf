<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Submit Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">

<div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="text-center text-3xl font-extrabold text-gray-900">Submit Book Feedback</h2>
</div>

<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-green-100">

        <form th:action="@{/feedback/saveFeedback}" th:object="${feedback}" method="post" class="space-y-6">

            <div>
                <label class="block text-sm font-medium text-gray-700">Your Name</label>
                <input type="text" th:field="*{name}" class="mt-1 p-2 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500">
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-sm text-red-600"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Book Name</label>
                <input type="text" th:field="*{bookName}" class="mt-1 p-2 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500">
                <p th:if="${#fields.hasErrors('bookName')}" th:errors="*{bookName}" class="mt-1 text-sm text-red-600"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Feedback</label>
                <textarea rows="4" th:field="*{feedback}" class="mt-1 p-2 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500"></textarea>
                <p th:if="${#fields.hasErrors('feedback')}" th:errors="*{feedback}" class="mt-1 text-sm text-red-600"></p>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none">
                    Submit
                </button>
            </div>
        </form>
        <div class="mt-4 text-center">
            <a th:href="@{/}" class="text-sm text-gray-500 hover:text-gray-900">← Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
