<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Application Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="max-w-2xl w-full mx-auto p-8">
    <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">Library Management System</h1>
    <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">Welcome to the Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 text-center hover:shadow-lg transition">
            <h2 class="text-2xl font-semibold text-blue-600 mb-4">Product Catalog</h2>
            <p class="text-gray-600 mb-6">Manage your inventory, add new items, and view the complete product list.</p>
            <div class="space-y-3">
                <a th:href="@{/product/addProduct}" class="block w-full bg-blue-500 text-white font-medium py-2 rounded hover:bg-blue-600">Add New Product</a>
                <a th:href="@{/product/displayProduct}" class="block w-full bg-gray-100 text-gray-700 font-medium py-2 rounded hover:bg-gray-200">View Catalog</a>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 text-center hover:shadow-lg transition">
            <h2 class="text-2xl font-semibold text-green-600 mb-4">Feedback System</h2>
            <p class="text-gray-600 mb-6">Collect and store user feedback for books securely in the database.</p>
            <div class="space-y-3">
                <a th:href="@{/feedback}" class="block w-full bg-green-500 text-white font-medium py-2 rounded hover:bg-green-600">Submit Feedback</a>
                <a th:href="@{/feedback/display}" class="block w-full bg-gray-100 text-gray-700 font-medium py-2 rounded hover:bg-gray-200">View Feedbacks</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
