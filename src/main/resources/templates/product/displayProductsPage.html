<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4 sm:px-6 lg:px-8">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-900">Product Catalog</h1>
        <div class="space-x-2">
            <a th:href="@{/}" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded">Home</a>
            <a th:href="@{/product/addProduct}" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Add Product +</a>
        </div>
    </div>

    <div class="bg-white shadow overflow-hidden sm:rounded-lg border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
            <tr th:each="prod : ${products}" class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${prod.id}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${prod.productName}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${prod.category}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-green-600 font-semibold" th:text="'₹' + ${prod.price}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                    <a th:href="@{/product/edit/{id}(id=${prod.id})}" class="text-indigo-600 hover:text-indigo-900 mr-4">Edit</a>

                    <a th:href="@{/product/delete/{id}(id=${prod.id})}"
                       onclick="return confirm('Are you sure you want to delete this product?');"
                       class="text-red-600 hover:text-red-900">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(products)}" class="p-6 text-center text-gray-500">
            No products found in the database.
        </div>
    </div>
</div>

</body>
</html>
