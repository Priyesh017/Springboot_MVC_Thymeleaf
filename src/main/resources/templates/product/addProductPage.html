<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">

<div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="text-center text-3xl font-extrabold text-gray-900">Add a New Product</h2>
</div>

<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-200">
        <form th:action="@{/product/addProduct}" th:object="${product}" method="post" class="space-y-6">

            <div>
                <label class="block text-sm font-medium text-gray-700">Product Name</label>
                <input type="text" th:field="*{productName}" class="mt-1 p-2 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                <p th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}" class="mt-1 text-sm text-red-600"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Price ($)</label>
                <input type="number" step="0.01" th:field="*{price}" class="mt-1 p-2 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="mt-1 text-sm text-red-600"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Category</label>
                <input type="text" th:field="*{category}" class="mt-1 p-2 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="mt-1 text-sm text-red-600"></p>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none">
                    Save Product
                </button>
            </div>
        </form>
        <div class="mt-4 text-center">
            <a th:href="@{/}" class="text-sm text-gray-500 hover:text-gray-900">← Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
